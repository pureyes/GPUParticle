<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPU Particle System - 100K Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050510;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(100, 150, 255, 0.2);
            border-top-color: #6496ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #6496ff;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loading-subtext {
            color: rgba(100, 150, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(100, 150, 255, 0.2);
            border-radius: 2px;
            margin-top: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6496ff, #a0c0ff);
            width: 0%;
            transition: width 0.3s ease;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
        }

        #controls strong {
            color: #6496ff;
            font-weight: 600;
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            display: none;
            z-index: 200;
        }

        .webgl-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 40px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50"><text x="50" y="35" text-anchor="middle" fill="%236496ff" font-family="Arial" font-weight="bold" font-size="14">WebGL 2.0</text></svg>') no-repeat center;
            background-size: contain;
            opacity: 0.6;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .loading-text {
                font-size: 16px;
            }
            .loading-subtext {
                font-size: 12px;
            }
            .progress-bar {
                width: 250px;
            }
            #controls {
                font-size: 11px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="unity-canvas"></canvas>
        
        <div id="loading">
            <div class="loader"></div>
            <div class="loading-text">Loading Experience</div>
            <div class="loading-subtext">100K GPU Particles</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="error">
            <h3>WebGL 2.0 Required</h3>
            <p>Your browser doesn't support WebGL 2.0, which is required for this experience.</p>
            <p>Please use Chrome, Firefox, or Edge.</p>
        </div>

        <div class="webgl-logo"></div>

        <div id="controls">
            <strong>Controls:</strong><br>
            • Left Click + Drag: Interact with particles<br>
            • Right Click + Drag: Rotate camera<br>
            • Scroll: Zoom in/out
        </div>
    </div>

    <script>
        // Check WebGL 2.0 support
        const canvas = document.getElementById('unity-canvas');
        const gl = canvas.getContext('webgl2');
        
        if (!gl) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            throw new Error('WebGL 2.0 not supported');
        }

        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        const config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
            showBanner: unityShowBanner,
        };

        const loadingScreen = document.getElementById('loading');
        const progressFill = document.getElementById('progressFill');

        // By default Unity keeps WebGL canvas render target size matched with
        // the DOM size of the canvas element (scaled by window.devicePixelRatio)
        // Set this to false if you want to decouple this synchronization from
        // happening inside the engine, and you would instead like to size up
        // the canvas DOM size and WebGL render target sizes yourself.
        config.matchWebGLToCanvasSize = false;

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            // Mobile device style: fill the whole browser client area with the game canvas:
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
        }

        loadingScreen.querySelector('.loading-text').textContent = 'Loading Engine';

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressFill.style.width = Math.round(progress * 100) + '%';
            }).then((unityInstance) => {
                progressFill.style.width = '100%';
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 300);
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);

        function unityShowBanner(msg, type) {
            console.log(type + ': ' + msg);
        }

        // Resize canvas to fill window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
